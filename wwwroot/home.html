<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamChat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;background:#f5f7fa;color:#2c3e50;}
        .left{flex:1;background:#1e2a35;display:flex;flex-direction:column;justify-content:center;padding:60px;position:relative;overflow:hidden;}
        .left::after{content:'';position:absolute;bottom:-80px;right:-80px;width:280px;height:280px;background:rgba(33,150,166,0.08);border-radius:50%;}
        .left::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;background:rgba(33,150,166,0.05);border-radius:50%;}
        .brand{display:flex;align-items:center;gap:10px;margin-bottom:48px;position:relative;z-index:1;}
        .brand-icon{width:38px;height:38px;background:#2196a6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
        .brand-name{font-size:18px;font-weight:800;color:#fff;}
        .left h2{font-size:34px;font-weight:800;color:#fff;line-height:1.2;letter-spacing:-0.8px;margin-bottom:14px;position:relative;z-index:1;}
        .left p{font-size:15px;color:#8fa3b1;line-height:1.65;max-width:340px;margin-bottom:40px;position:relative;z-index:1;}
        .feat-list{display:flex;flex-direction:column;gap:14px;position:relative;z-index:1;}
        .feat-item{display:flex;align-items:center;gap:12px;color:#8fa3b1;font-size:14px;}
        .feat-dot{width:8px;height:8px;border-radius:50%;background:#2196a6;flex-shrink:0;}
        .right{width:480px;background:#fff;display:flex;align-items:center;justify-content:center;padding:48px 40px;border-left:1px solid #e8ecef;}
        .form{width:100%;max-width:360px;}
        .form h3{font-size:24px;font-weight:800;color:#1e2a35;margin-bottom:6px;letter-spacing:-0.4px;}
        .form .sub{font-size:14px;color:#7f8c8d;margin-bottom:32px;}
        .btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;}
        .btn-user{background:#2196a6;color:#fff;box-shadow:0 4px 14px rgba(33,150,166,0.3);}
        .btn-user:hover{background:#1a7a8a;box-shadow:0 6px 20px rgba(33,150,166,0.4);}
        .btn-admin{background:#f5f7fa;color:#2c3e50;border:1.5px solid #e8ecef;}
        .btn-admin:hover{background:#e8ecef;}
        @media(max-width:768px){.left{display:none;}.right{width:100%;border:none;}}
    </style>
</head>
<body>
    <div class="left">
        <div class="brand"><div class="brand-icon">💬</div><span class="brand-name">TeamChat</span></div>
        <h2>Your team's communication hub</h2>
        <p>Real-time messaging, daily standups, blocker tracking — all in one place.</p>
        <div class="feat-list">
            <div class="feat-item"><div class="feat-dot"></div>Real-time team messaging</div>
            <div class="feat-item"><div class="feat-dot"></div>Daily status updates</div>
            <div class="feat-item"><div class="feat-dot"></div>Blocker &amp; dependency tracking</div>
            <div class="feat-item"><div class="feat-dot"></div>Voice calls &amp; image sharing</div>
        </div>
    </div>
    <div class="right">
        <div class="form">
            <h3>Get started</h3>
            <p class="sub">Choose how you'd like to sign in</p>
            <a class="btn btn-user" href="/login.html">👤 User Login</a>
            <a class="btn btn-admin" href="/admin.html">🛡️ Admin Login</a>
        </div>
    </div>
</body>
</html>
