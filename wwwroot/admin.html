<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Live Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #4a3f6b 60%, #7b6fa0 80%, #a89bc2 100%);
            background-attachment: fixed;
        }
        body::before {
            content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(180deg, transparent 0%, #2d1b4e 100%);
            clip-path: polygon(0% 60%, 8% 40%, 15% 50%, 22% 30%, 30% 45%, 38% 20%, 45% 35%, 52% 15%, 60% 30%, 68% 10%, 75% 25%, 82% 5%, 90% 20%, 95% 10%, 100% 15%, 100% 100%, 0% 100%);
            z-index: 0; opacity: 0.8;
        }
        #loginScreen {
            position: relative; z-index: 1;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .login-card {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
            padding: 40px; width: 100%; max-width: 380px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .login-card h2 { color: white; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 6px; }
        .login-card .subtitle { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; margin-bottom: 28px; }
        input, select {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; font-size: 14px; color: white; outline: none;
            margin-bottom: 14px; transition: border 0.2s, background 0.2s;
        }
        input::placeholder { color: rgba(255,255,255,0.4); }
        input:focus, select:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); }
        select { cursor: pointer; appearance: none; }
        select option { background: #1a1a2e; color: white; }
        .btn-primary {
            width: 100%; padding: 13px; background: #e91e8c; color: white;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(233,30,140,0.4);
        }
        .btn-primary:hover { background: #c2185b; transform: scale(1.02); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg {
            background: rgba(233,30,74,0.2); border: 1px solid rgba(233,30,74,0.4);
            color: #ff6b8a; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 14px; display: none;
        }
        .back-link { text-align: center; margin-top: 18px; color: rgba(255,255,255,0.5); font-size: 13px; }
        .back-link a { color: #e91e8c; text-decoration: none; font-weight: 600; }
        #dashboard { display: none; position: relative; z-index: 1; min-height: 100vh; }
        .topbar {
            background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
        }
        .topbar h1 { color: white; font-size: 20px; font-weight: 700; }
        .topbar span { color: rgba(255,255,255,0.5); font-size: 13px; }
        .btn-logout {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7); border-radius: 8px; padding: 7px 14px;
            cursor: pointer; font-size: 13px; transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }
        .dashboard-body { padding: 28px; max-width: 1100px; margin: 0 auto; }

        /* ── Tabs ── */
        .tabs-bar {
            display: flex; gap: 4px; margin-bottom: 24px;
            background: rgba(0,0,0,0.2); border-radius: 12px; padding: 5px;
            width: fit-content;
        }
        .tab-btn {
            padding: 9px 22px; border-radius: 9px; border: none; cursor: pointer;
            font-size: 14px; font-weight: 600; transition: background 0.2s, color 0.2s;
            background: transparent; color: rgba(255,255,255,0.5);
        }
        .tab-btn.active { background: #e91e8c; color: white; box-shadow: 0 2px 10px rgba(233,30,140,0.4); }
        .tab-btn:not(.active):hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Tab panel header row ── */
        .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .section-title { color: white; font-size: 18px; font-weight: 700; }
        .btn-add {
            padding: 9px 18px; background: #e91e8c; color: white;
            border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: background 0.2s;
            box-shadow: 0 2px 10px rgba(233,30,140,0.35);
        }
        .btn-add:hover { background: #c2185b; }

        .table-card {
            background: rgba(255,255,255,0.06); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: rgba(0,0,0,0.2); }
        th { padding: 14px 18px; text-align: left; color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 14px 18px; color: rgba(255,255,255,0.85); font-size: 14px; border-top: 1px solid rgba(255,255,255,0.07); vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.04); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 2px 2px; }
        .badge-active { background: rgba(0,229,160,0.15); color: #00e5a0; border: 1px solid rgba(0,229,160,0.3); }
        .badge-project { background: rgba(100,149,237,0.15); color: #6495ed; border: 1px solid rgba(100,149,237,0.3); }
        .badge-member { background: rgba(100,149,237,0.15); color: #6495ed; border: 1px solid rgba(100,149,237,0.3); }
        .badge-viewer { background: rgba(255,200,0,0.15); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 14px; }

        /* ── Modals ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: rgba(20,12,45,0.97); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px; padding: 36px; width: 100%; max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .modal h3 { color: white; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .modal label { display: block; color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 6px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7);
            border-radius: 10px; font-size: 14px; cursor: pointer; transition: background 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.15); }
        .btn-submit {
            flex: 1; padding: 12px; background: #e91e8c; color: white;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-submit:hover { background: #c2185b; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-action { padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; border: none; }
        .btn-action:hover { opacity: 0.8; }
        .btn-edit { background: rgba(100,149,237,0.2); color: #6495ed; border: 1px solid rgba(100,149,237,0.3) !important; }
        .btn-delete { background: rgba(233,30,74,0.2); color: #ff6b8a; border: 1px solid rgba(233,30,74,0.3) !important; }
        .btn-msg { background: rgba(233,30,140,0.2); color: #e91e8c; border: 1px solid rgba(233,30,140,0.3) !important; }

        /* ── Admin chat modal textarea ── */
        .modal textarea {
            width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
            font-size: 14px; color: white; outline: none; font-family: inherit;
            resize: none; min-height: 100px; margin-bottom: 14px;
            transition: border 0.2s, background 0.2s;
        }
        .modal textarea::placeholder { color: rgba(255,255,255,0.4); }
        .modal textarea:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); }

        /* ── Admin live chat panel ── */
        .chat-modal { max-width: 520px; display: flex; flex-direction: column; height: 520px; padding: 24px; }
        .chat-modal h3 { margin-bottom: 12px; flex-shrink: 0; }
        .admin-chat-messages {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; margin-bottom: 12px;
        }
        .admin-chat-messages::-webkit-scrollbar { width: 4px; }
        .admin-chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .acm-bubble { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 13px; line-height: 1.5; word-break: break-word; }
        .acm-bubble.from-admin { background: rgba(233,30,140,0.2); border: 1px solid rgba(233,30,140,0.25); align-self: flex-end; color: rgba(255,255,255,0.9); }
        .acm-bubble.from-user { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; color: rgba(255,255,255,0.85); }
        .acm-meta { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; text-align: right; }
        .acm-meta.left { text-align: left; }
        .admin-chat-input-row { display: flex; gap: 8px; flex-shrink: 0; }
        .admin-chat-input-row input {
            flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
            font-size: 13px; color: white; outline: none; margin-bottom: 0;
        }
        .admin-chat-input-row input:focus { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.15); }
        .admin-chat-input-row button {
            padding: 10px 18px; background: #e91e8c; color: white; border: none;
            border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .admin-chat-input-row button:hover { background: #c2185b; }
        .acm-date-sep { text-align: center; font-size: 10px; color: rgba(255,255,255,0.3); margin: 4px 0; }

        /* ── Multi-project checkboxes ── */
        .project-checklist {
            max-height: 180px; overflow-y: auto;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; padding: 8px; margin-bottom: 14px;
        }
        .project-checklist::-webkit-scrollbar { width: 4px; }
        .project-checklist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .check-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: 8px; cursor: pointer;
            transition: background 0.15s;
        }
        .check-item:hover { background: rgba(255,255,255,0.07); }
        .check-item input[type="checkbox"] {
            width: 16px; height: 16px; margin: 0; padding: 0;
            accent-color: #e91e8c; cursor: pointer;
        }
        .check-item span { color: rgba(255,255,255,0.85); font-size: 14px; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(0,229,160,0.15); border: 1px solid rgba(0,229,160,0.4);
            color: #00e5a0; padding: 12px 24px; border-radius: 12px;
            font-size: 14px; font-weight: 600; backdrop-filter: blur(10px);
            opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 9999;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div id="loginScreen">
    <div class="login-card">
        <h2>🛡️ Admin Login</h2>
        <p class="subtitle">Sign in with your admin account</p>
        <div class="error-msg" id="errorMsg"></div>
        <input type="email" id="adminEmail" placeholder="Admin email" />
        <input type="password" id="adminPassword" placeholder="Password" />
        <button class="btn-primary" id="loginBtn" onclick="adminLogin()">Login</button>
        <div class="back-link"><a href="/home.html">← Back to home</a></div>
    </div>
</div>

<div id="dashboard">
    <div class="topbar">
        <div>
            <h1>🛡️ Admin Panel</h1>
            <span id="adminName"></span>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
    <div class="dashboard-body">

        <!-- Browser-style tabs -->
        <div class="tabs-bar">
            <button class="tab-btn active" onclick="switchTab('projects')">📁 Projects</button>
            <button class="tab-btn" onclick="switchTab('users')">👤 Users</button>
        </div>

        <!-- Projects Tab -->
        <div class="tab-panel active" id="tab-projects">
            <div class="panel-header">
                <div class="section-title">Projects</div>
                <button class="btn-add" onclick="openModal('projectModal')">+ New Project</button>
            </div>
            <div class="table-card">
                <table>
                    <thead><tr><th>Project Name</th><th>Description</th><th>Created</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="projectsTableBody"><tr><td colspan="5" class="empty-state">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <!-- Users Tab -->
        <div class="tab-panel" id="tab-users">
            <div class="panel-header">
                <div class="section-title">Users</div>
                <button class="btn-add" onclick="openModal('userModal')">+ New User</button>
            </div>
            <div class="table-card">
                <table>
                    <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Projects</th><th>Created</th><th>Actions</th></tr></thead>
                    <tbody id="usersTableBody"><tr><td colspan="5" class="empty-state">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- Create Project Modal -->
<div class="modal-overlay" id="projectModal">
    <div class="modal">
        <h3>📁 Create Project</h3>
        <label>Project Name</label>
        <input type="text" id="projectName" placeholder="e.g. Support Chat" />
        <label>Description</label>
        <input type="text" id="projectDesc" placeholder="Short description" />
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('projectModal')">Cancel</button>
            <button class="btn-submit" onclick="createProject()">Create</button>
        </div>
    </div>
</div>

<!-- Edit Project Modal -->
<div class="modal-overlay" id="editProjectModal">
    <div class="modal">
        <h3>✏️ Edit Project</h3>
        <input type="hidden" id="editProjectId" />
        <label>Project Name</label>
        <input type="text" id="editProjectName" placeholder="Project name" />
        <label>Description</label>
        <input type="text" id="editProjectDesc" placeholder="Short description" />
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('editProjectModal')">Cancel</button>
            <button class="btn-submit" onclick="saveEditProject()">Save</button>
        </div>
    </div>
</div>

<!-- Create User Modal -->
<div class="modal-overlay" id="userModal">
    <div class="modal">
        <h3>👤 Create User</h3>
        <label>Display Name</label>
        <input type="text" id="newUserName" placeholder="Full name" />
        <label>Email</label>
        <input type="email" id="newUserEmail" placeholder="user@example.com" />
        <label>Password</label>
        <input type="password" id="newUserPassword" placeholder="Min 6 characters" />
        <label>Projects (select one or more)</label>
        <div class="project-checklist" id="newUserProjectList"></div>
        <label>Role</label>
        <select id="newUserRole">
            <option value="member">Member — can chat, post, call</option>
            <option value="viewer">Viewer — read only</option>
        </select>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('userModal')">Cancel</button>
            <button class="btn-submit" id="createUserBtn" onclick="createUser()">Create</button>
        </div>
    </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="editUserModal">
    <div class="modal">
        <h3>✏️ Edit User</h3>
        <input type="hidden" id="editUserId" />
        <label>Display Name</label>
        <input type="text" id="editUserName" placeholder="Full name" />
        <label>Projects (select one or more)</label>
        <div class="project-checklist" id="editUserProjectList"></div>
        <label>Role</label>
        <select id="editUserRole">
            <option value="member">Member — can chat, post, call</option>
            <option value="viewer">Viewer — read only</option>
        </select>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('editUserModal')">Cancel</button>
            <button class="btn-submit" onclick="saveEditUser()">Save</button>
        </div>
    </div>
</div>

<!-- Admin Live Chat Modal -->
<div class="modal-overlay" id="msgModal">
    <div class="modal chat-modal">
        <h3>💬 Chat with <span id="msgTargetName"></span></h3>
        <input type="hidden" id="msgTargetUid" />
        <div class="admin-chat-messages" id="adminChatMessages"></div>
        <div class="admin-chat-input-row">
            <input type="text" id="adminChatInput" placeholder="Type a message..." />
            <button onclick="sendAdminMessage()">Send</button>
        </div>
        <div style="margin-top:10px;">
            <button class="btn-cancel" style="width:100%;" onclick="closeAdminChat()">Close</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD77O5jlRji43PruIH9K4uusvFCJQxAbxQ",
        authDomain: "livechatapp-b5399.firebaseapp.com",
        projectId: "livechatapp-b5399",
        storageBucket: "livechatapp-b5399.firebasestorage.app",
        messagingSenderId: "738890891030",
        appId: "1:738890891030:web:55fd84416375761f955a37"
    };
    firebase.initializeApp(firebaseConfig);
    const secondaryApp = firebase.initializeApp(firebaseConfig, "secondary");
    const db = firebase.firestore();
    const ADMIN_UID = "SZvYG7wbQ9TzgWySvLwVU240reD3";

    let projects = [];
    let users = [];

    // ── Tab switching ──
    function switchTab(name) {
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById("tab-" + name).classList.add("active");
        event.currentTarget.classList.add("active");
    }

    firebase.auth().onAuthStateChanged(async function(user) {
        if (user && user.uid === ADMIN_UID) {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("adminName").textContent = user.displayName || user.email;
            await loadProjects();
            await loadUsers();
        }
    });

    async function adminLogin() {
        const email = document.getElementById("adminEmail").value.trim();
        const password = document.getElementById("adminPassword").value;
        const btn = document.getElementById("loginBtn");
        if (!email || !password) { showError("Please fill in all fields"); return; }
        btn.disabled = true; btn.textContent = "Logging in..."; hideError();
        try {
            const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
            if (cred.user.uid !== ADMIN_UID) {
                await firebase.auth().signOut();
                showError("Access denied. Not an admin account.");
                btn.disabled = false; btn.textContent = "Login";
            }
        } catch (e) {
            showError(getErrMsg(e.code));
            btn.disabled = false; btn.textContent = "Login";
        }
    }

    function logout() { firebase.auth().signOut().then(() => window.location.href = "/home.html"); }

    function openModal(id) {
        if (id === "userModal") fillChecklist("newUserProjectList", []);
        document.getElementById(id).classList.add("active");
    }
    function closeModal(id) { document.getElementById(id).classList.remove("active"); }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }
    document.querySelectorAll(".modal-overlay").forEach(el => {
        el.addEventListener("click", e => {
            if (e.target === el) {
                if (el.id === "msgModal") closeAdminChat();
                else closeModal(el.id);
            }
        });
    });

    // ── Multi-project checklist ──
    function fillChecklist(containerId, selectedIds) {
        const container = document.getElementById(containerId);
        if (!projects.length) { container.innerHTML = '<div style="color:rgba(255,255,255,0.4);padding:10px;font-size:13px;">No projects available</div>'; return; }
        container.innerHTML = projects.map(p => `
            <label class="check-item">
                <input type="checkbox" value="${p.id}" ${selectedIds.includes(p.id) ? "checked" : ""} />
                <span>${p.name}</span>
            </label>`).join("");
    }

    function getCheckedProjects(containerId) {
        return Array.from(document.querySelectorAll(`#${containerId} input[type="checkbox"]:checked`))
            .map(cb => ({ id: cb.value, name: projects.find(p => p.id === cb.value)?.name || cb.value }));
    }

    // ── Projects ──
    async function loadProjects() {
        const snap = await db.collection("projects").orderBy("created", "desc").get();
        projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderProjects();
    }

    async function createProject() {
        const name = document.getElementById("projectName").value.trim();
        const desc = document.getElementById("projectDesc").value.trim();
        if (!name) { alert("Project name is required"); return; }
        await db.collection("projects").add({ name, desc, created: new Date().toISOString(), status: "active" });
        document.getElementById("projectName").value = "";
        document.getElementById("projectDesc").value = "";
        closeModal("projectModal");
        await loadProjects();
        showToast("✅ Project created");
    }

    function editProject(id) {
        const p = projects.find(x => x.id === id);
        if (!p) return;
        document.getElementById("editProjectId").value = id;
        document.getElementById("editProjectName").value = p.name;
        document.getElementById("editProjectDesc").value = p.desc || "";
        document.getElementById("editProjectModal").classList.add("active");
    }

    async function saveEditProject() {
        const id = document.getElementById("editProjectId").value;
        const name = document.getElementById("editProjectName").value.trim();
        const desc = document.getElementById("editProjectDesc").value.trim();
        if (!name) { alert("Project name is required"); return; }
        await db.collection("projects").doc(id).update({ name, desc });
        closeModal("editProjectModal");
        await loadProjects();
        showToast("✅ Project updated");
    }

    async function deleteProject(id) {
        if (!confirm("Delete this project?")) return;
        await db.collection("projects").doc(id).delete();
        await loadProjects();
    }

    function renderProjects() {
        const tbody = document.getElementById("projectsTableBody");
        if (!projects.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No projects yet.</td></tr>`; return; }
        tbody.innerHTML = projects.map(p => `<tr>
            <td>${p.name}</td><td>${p.desc || "—"}</td>
            <td>${new Date(p.created).toLocaleDateString()}</td>
            <td><span class="badge badge-active">${p.status}</span></td>
            <td style="display:flex;gap:6px;">
                <button class="btn-action btn-edit" onclick="editProject('${p.id}')">Edit</button>
                <button class="btn-action btn-delete" onclick="deleteProject('${p.id}')">Delete</button>
            </td>
        </tr>`).join("");
    }

    // ── Users ──
    async function loadUsers() {
        const snap = await db.collection("users").orderBy("created", "desc").get();
        users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderUsers();
    }

    async function createUser() {
        const name = document.getElementById("newUserName").value.trim();
        const email = document.getElementById("newUserEmail").value.trim();
        const password = document.getElementById("newUserPassword").value;
        const selectedProjects = getCheckedProjects("newUserProjectList");
        const role = document.getElementById("newUserRole").value;
        const btn = document.getElementById("createUserBtn");
        if (!name || !email || !password) { alert("All fields are required"); return; }
        if (!selectedProjects.length) { alert("Please select at least one project"); return; }
        if (password.length < 6) { alert("Password must be at least 6 characters"); return; }
        btn.disabled = true; btn.textContent = "Creating...";
        try {
            const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, password);
            await cred.user.updateProfile({ displayName: name });
            await secondaryApp.auth().signOut();
            await db.collection("users").doc(cred.user.uid).set({
                name, email, role,
                projectId: selectedProjects[0].id,
                projectName: selectedProjects[0].name,
                projects: selectedProjects,
                created: new Date().toISOString()
            });
            document.getElementById("newUserName").value = "";
            document.getElementById("newUserEmail").value = "";
            document.getElementById("newUserPassword").value = "";
            document.getElementById("newUserRole").value = "member";
            closeModal("userModal");
            await loadUsers();
            showToast(`✅ User "${name}" created`);
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false; btn.textContent = "Create";
        }
    }

    function editUser(uid) {
        const u = users.find(x => x.id === uid);
        if (!u) return;
        document.getElementById("editUserId").value = uid;
        document.getElementById("editUserName").value = u.name;
        document.getElementById("editUserRole").value = u.role || "member";
        const selectedIds = u.projects ? u.projects.map(p => p.id) : (u.projectId ? [u.projectId] : []);
        fillChecklist("editUserProjectList", selectedIds);
        document.getElementById("editUserModal").classList.add("active");
    }

    async function saveEditUser() {
        const uid = document.getElementById("editUserId").value;
        const name = document.getElementById("editUserName").value.trim();
        const role = document.getElementById("editUserRole").value;
        const selectedProjects = getCheckedProjects("editUserProjectList");
        if (!name) { alert("Name is required"); return; }
        if (!selectedProjects.length) { alert("Select at least one project"); return; }
        await db.collection("users").doc(uid).update({
            name, role,
            projectId: selectedProjects[0].id,
            projectName: selectedProjects[0].name,
            projects: selectedProjects
        });
        await loadUsers();
        closeModal("editUserModal");
        showToast("✅ User updated");
    }

    async function deleteUser(uid, name) {
        if (!confirm(`Remove "${name}"?\n\nAlso delete from Firebase Console > Authentication to revoke login.`)) return;
        await db.collection("users").doc(uid).delete();
        await loadUsers();
    }

    function renderUsers() {
        const tbody = document.getElementById("usersTableBody");
        if (!users.length) { tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No users yet.</td></tr>`; return; }
        tbody.innerHTML = users.map(u => {
            const projectList = u.projects && u.projects.length
                ? u.projects.map(p => `<span class="badge badge-project">${p.name}</span>`).join("")
                : `<span class="badge badge-project">${u.projectName || u.projectId}</span>`;
            const role = u.role || "member";
            const roleBadge = `<span class="badge badge-${role}">${role.charAt(0).toUpperCase() + role.slice(1)}</span>`;
            return `<tr>
                <td>${u.name}</td><td>${u.email}</td>
                <td>${roleBadge}</td>
                <td>${projectList}</td>
                <td>${new Date(u.created).toLocaleDateString()}</td>
                <td style="display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="btn-action btn-msg" onclick="openMsgModal('${u.id}','${u.name}')">Message</button>
                    <button class="btn-action btn-edit" onclick="editUser('${u.id}')">Edit</button>
                    <button class="btn-action btn-delete" onclick="deleteUser('${u.id}','${u.name}')">Delete</button>
                </td>
            </tr>`;
        }).join("");
    }

    // ── Admin live chat ──
    let adminChatUnsub = null;

    function openMsgModal(uid, name) {
        document.getElementById("msgTargetUid").value = uid;
        document.getElementById("msgTargetName").textContent = name;
        document.getElementById("adminChatInput").value = "";
        document.getElementById("msgModal").classList.add("active");
        // unsubscribe previous listener
        if (adminChatUnsub) { adminChatUnsub(); adminChatUnsub = null; }
        // listen real-time
        adminChatUnsub = db.collection("adminMessages").doc(uid)
            .collection("chats").orderBy("timestamp", "asc")
            .onSnapshot(snap => {
                const container = document.getElementById("adminChatMessages");
                if (snap.empty) { container.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:20px;">No messages yet. Say hi!</div>'; return; }
                let html = ""; let lastDate = null;
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    const date = d.timestamp ? d.timestamp.toDate() : new Date();
                    const dateLabel = getAdminDateLabel(date);
                    if (dateLabel !== lastDate) {
                        lastDate = dateLabel;
                        html += `<div class="acm-date-sep">${dateLabel}</div>`;
                    }
                    const time = date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
                    const isAdmin = d.from === "Admin";
                    html += `<div>
                        <div class="acm-bubble ${isAdmin ? 'from-admin' : 'from-user'}">${d.text}</div>
                        <div class="acm-meta ${isAdmin ? '' : 'left'}">${isAdmin ? 'You' : d.from || 'User'} · ${time}</div>
                    </div>`;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
        // enter key to send
        document.getElementById("adminChatInput").onkeypress = function(e) {
            if (e.key === "Enter") sendAdminMessage();
        };
    }

    function getAdminDateLabel(date) {
        const today = new Date(); const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
        if (date.toDateString() === today.toDateString()) return "Today";
        if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
        return date.toLocaleDateString([], { day: "numeric", month: "short", year: "numeric" });
    }

    async function sendAdminMessage() {
        const uid = document.getElementById("msgTargetUid").value;
        const text = document.getElementById("adminChatInput").value.trim();
        if (!text) return;
        document.getElementById("adminChatInput").value = "";
        await db.collection("adminMessages").doc(uid).collection("chats").add({
            text, from: "Admin",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    function closeAdminChat() {
        if (adminChatUnsub) { adminChatUnsub(); adminChatUnsub = null; }
        closeModal("msgModal");
    }

    function showError(msg) { const el = document.getElementById("errorMsg"); el.textContent = msg; el.style.display = "block"; }
    function hideError() { document.getElementById("errorMsg").style.display = "none"; }
    function getErrMsg(code) {
        switch(code) {
            case "auth/user-not-found": return "No account found with this email";
            case "auth/wrong-password": case "auth/invalid-credential": case "auth/invalid-login-credentials": return "Incorrect email or password";
            case "auth/too-many-requests": return "Too many attempts. Try again later";
            default: return "Login failed. Please try again";
        }
    }
    document.getElementById("adminPassword").addEventListener("keypress", e => { if (e.key === "Enter") adminLogin(); });
</script>
</body>
</html>
