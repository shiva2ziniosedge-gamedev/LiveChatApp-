<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #4a3f6b 60%, #7b6fa0 80%, #a89bc2 100%);
            background-attachment: fixed;
        }

        /* Mountain silhouette layers */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: 
                linear-gradient(180deg, transparent 0%, #2d1b4e 100%);
            clip-path: polygon(0% 60%, 8% 40%, 15% 50%, 22% 30%, 30% 45%, 38% 20%, 45% 35%, 52% 15%, 60% 30%, 68% 10%, 75% 25%, 82% 5%, 90% 20%, 95% 10%, 100% 15%, 100% 100%, 0% 100%);
            z-index: 0;
            opacity: 0.8;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 35%;
            background: linear-gradient(180deg, transparent 0%, #1a0f2e 100%);
            clip-path: polygon(0% 70%, 10% 50%, 18% 65%, 25% 40%, 35% 55%, 42% 35%, 50% 50%, 58% 25%, 65% 40%, 72% 20%, 80% 35%, 88% 15%, 95% 30%, 100% 20%, 100% 100%, 0% 100%);
            z-index: 0;
            opacity: 0.9;
        }

        .chat-wrapper {
            position: relative;
            z-index: 1;
            width: 92%;
            max-width: 950px;
            height: 88vh;
            display: flex;
            flex-direction: row;
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        /* ── Sidebar ── */
        .online-users {
            width: 210px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.15);
        }

        .online-users-header {
            padding: 22px 16px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .online-users-header h3 {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .online-users-list {
            padding: 12px 10px;
            flex: 1;
            overflow-y: auto;
        }

        .online-users-list::-webkit-scrollbar { width: 4px; }
        .online-users-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .user-item {
            padding: 9px 12px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-item::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00e5a0;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px #00e5a0;
        }

        .user-name { flex: 1; }

        .btn-call {
            background: rgba(0, 229, 160, 0.2);
            border: 1px solid rgba(0, 229, 160, 0.3);
            color: #00e5a0;
            border-radius: 6px;
            padding: 3px 7px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .btn-call:hover { background: rgba(0, 229, 160, 0.4); }

        /* ── Call Overlay ── */
        .call-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .call-overlay.active { display: flex; }

        .call-box {
            background: rgba(30, 20, 60, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .call-avatar {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #7b6fa0, #e91e8c);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(233,30,140,0.4); }
            50% { box-shadow: 0 0 0 15px rgba(233,30,140,0); }
        }

        .call-status { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 6px; }
        .call-name { color: white; font-size: 22px; font-weight: 700; margin-bottom: 30px; }
        .call-actions { display: flex; gap: 20px; justify-content: center; }

        .btn-accept {
            width: 56px; height: 56px; background: #00e5a0;
            border: none; border-radius: 50%; cursor: pointer; font-size: 22px;
            transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,229,160,0.4);
        }
        .btn-accept:hover { transform: scale(1.1); }

        .btn-reject, .btn-end {
            width: 56px; height: 56px; background: #e91e4a;
            border: none; border-radius: 50%; cursor: pointer; font-size: 22px;
            transition: transform 0.2s; box-shadow: 0 4px 15px rgba(233,30,74,0.4);
        }
        .btn-reject:hover, .btn-end:hover { transform: scale(1.1); }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            background: rgba(0, 0, 0, 0.1);
        }

        /* Mobile call button - hidden on desktop, shown on mobile */
        .btn-mobile-users {
            display: none;
            background: rgba(0, 229, 160, 0.2);
            border: 1px solid rgba(0, 229, 160, 0.4);
            color: #00e5a0;
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .chat-header h2 {
            color: white;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .chat-header span {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        /* ── Messages ── */
        #messagesList {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #messagesList::-webkit-scrollbar { width: 5px; }
        #messagesList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .message {
            display: flex;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 65%;
        }

        .message-user {
            font-weight: 600;
            font-size: 12px;
            color: #c084fc;
            margin-bottom: 4px;
        }

        .message-text {
            color: rgba(255, 255, 255, 0.92);
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            text-align: right;
            margin-top: 5px;
        }

        /* ── Notifications ── */
        .notification {
            text-align: center;
            margin: 4px 0;
        }

        .notification span {
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.45);
            font-size: 12px;
            padding: 4px 14px;
            border-radius: 20px;
            font-style: italic;
        }

        /* ── Typing ── */
        #typingIndicator {
            padding: 4px 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            font-style: italic;
            min-height: 22px;
        }

        /* ── Input Area ── */
        .chat-input {
            padding: 14px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 11px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            font-size: 14px;
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
            transition: border 0.2s, background 0.2s;
        }

        input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.4); }

        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.15);
        }

        input[type="text"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-send {
            padding: 11px 26px;
            background: #e91e8c;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(233, 30, 140, 0.4);
        }

        .btn-send:hover { background: #c2185b; transform: scale(1.03); }
        .btn-send:active { transform: scale(0.97); }

        .btn-image {
            padding: 11px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
        }

        .btn-image:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-image svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @media (max-width: 768px) {
            body { align-items: stretch; }

            .chat-wrapper {
                width: 100%;
                height: 100vh;
                height: 100dvh; /* dynamic viewport for mobile browsers */
                border-radius: 0;
                flex-direction: column;
                border: none;
            }

            /* Hide sidebar on mobile */
            .online-users { display: none; }

            /* Show call button in header on mobile */
            .btn-mobile-users { display: block; }

            /* Compact header */
            .chat-header {
                padding: 12px 16px;
            }

            .chat-header h2 {
                font-size: 17px;
            }

            /* Messages take full space */
            #messagesList {
                padding: 12px;
            }

            .message-content {
                max-width: 80%;
            }

            /* Input area stacks better */
            .chat-input {
                padding: 10px 12px;
                gap: 8px;
            }

            .input-row {
                gap: 8px;
            }

            input[type="text"] {
                font-size: 16px; /* prevents iOS zoom on focus */
                padding: 10px 14px;
            }

            /* Name input full width on mobile */
            #userInput {
                max-width: 100% !important;
            }

            .btn-send {
                padding: 10px 18px;
                font-size: 14px;
                white-space: nowrap;
            }

            .btn-image {
                width: 42px;
                height: 42px;
                flex-shrink: 0;
            }
        }

        /* Very small screens */
        @media (max-width: 380px) {
            .btn-send {
                padding: 10px 12px;
                font-size: 13px;
            }

            .message-content {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">

        <!-- Sidebar -->
        <div class="online-users">
            <div class="online-users-header">
                <h3>Online &nbsp;<span id="userCount" style="color:#00e5a0;">0</span></h3>
            </div>
            <div class="online-users-list" id="usersList"></div>
        </div>

        <!-- Main Chat -->
        <div class="chat-main">
            <div class="chat-header">
                <div>
                    <h2>Let's Talk 💬</h2>
                    <span id="onlineStatus">Connecting...</span>
                </div>
                <div style="display:flex; gap:8px; align-items:center;">
                    <button class="btn-mobile-users" id="mobileCallBtn">📞 Users</button>
                    <button id="logoutBtn" onclick="firebase.auth().signOut().then(()=> window.location.href='/login.html')" style="display:none; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); border-radius:8px; padding:7px 12px; cursor:pointer; font-size:13px;">Logout</button>
                </div>
            </div>

            <div id="messagesList"></div>
            <div id="typingIndicator"></div>

            <div class="chat-input">
                <div class="input-row">
                    <input type="text" id="userInput" placeholder="Your name" style="max-width: 180px;" />
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Your message..." />
                    <input type="file" id="imageInput" accept="image/*" style="display:none;" />
                    <button class="btn-image" id="imageButton" title="Send Image">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="3" ry="3"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </button>
                    <button class="btn-send" id="sendButton">Send</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Call Overlay -->
    <div class="call-overlay" id="callOverlay">
        <div class="call-box">
            <div class="call-avatar">👤</div>
            <div class="call-status" id="callStatus">Incoming Call</div>
            <div class="call-name" id="callName">Unknown</div>
            <div class="call-actions" id="callActions">
                <button class="btn-accept" id="acceptCallBtn" title="Accept">📞</button>
                <button class="btn-reject" id="rejectCallBtn" title="Reject">📵</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <audio id="remoteAudio" autoplay></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD77O5jlRji43PruIH9K4uusvFCJQxAbxQ",
            authDomain: "livechatapp-b5399.firebaseapp.com",
            projectId: "livechatapp-b5399",
            storageBucket: "livechatapp-b5399.firebasestorage.app",
            messagingSenderId: "738890891030",
            appId: "1:738890891030:web:55fd84416375761f955a37"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(function(user) {
            if (!user) {
                window.location.href = "/login.html";
            } else {
                const projectId = sessionStorage.getItem("projectId") || "default";
                const projectName = sessionStorage.getItem("projectName") || "Chat";
                const name = sessionStorage.getItem("userName") || user.displayName || user.email;

                window.firebaseUser = user;
                window._chatProjectId = projectId;
                window._chatProjectName = projectName;
                document.getElementById("userInput").value = name;
                document.getElementById("userInput").disabled = true;
                document.getElementById("logoutBtn").style.display = "block";
                document.querySelector(".chat-header h2").textContent = "💬 " + projectName;
            }
        });
    </script>

    <!-- Mobile users popup -->
    <div id="mobileUsersOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:200; justify-content:center; align-items:flex-end;">
        <div style="background:rgba(20,10,40,0.97); border:1px solid rgba(255,255,255,0.15); border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-height:60vh; overflow-y:auto;">
            <p style="color:white; font-size:16px; font-weight:700; text-align:center; margin-bottom:16px;">📞 Call Someone</p>
            <div id="mobileUsersList"></div>
            <button onclick="document.getElementById('mobileUsersOverlay').style.display='none';" style="width:100%; padding:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:10px; cursor:pointer; font-size:14px; margin-top:10px;">Close</button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
