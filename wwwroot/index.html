<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #4a3f6b 60%, #7b6fa0 80%, #a89bc2 100%);
            background-attachment: fixed;
        }
        body::before {
            content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(180deg, transparent 0%, #2d1b4e 100%);
            clip-path: polygon(0% 60%, 8% 40%, 15% 50%, 22% 30%, 30% 45%, 38% 20%, 45% 35%, 52% 15%, 60% 30%, 68% 10%, 75% 25%, 82% 5%, 90% 20%, 95% 10%, 100% 15%, 100% 100%, 0% 100%);
            z-index: 0; opacity: 0.8;
        }
        body::after {
            content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 35%;
            background: linear-gradient(180deg, transparent 0%, #1a0f2e 100%);
            clip-path: polygon(0% 70%, 10% 50%, 18% 65%, 25% 40%, 35% 55%, 42% 35%, 50% 50%, 58% 25%, 65% 40%, 72% 20%, 80% 35%, 88% 15%, 95% 30%, 100% 20%, 100% 100%, 0% 100%);
            z-index: 0; opacity: 0.9;
        }
        .chat-wrapper {
            position: relative; z-index: 1; width: 92%; max-width: 1050px; height: 88vh;
            display: flex; flex-direction: row; border-radius: 20px; overflow: hidden;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        /* ── Collapsible Sidebar ── */
        .online-users {
            display: flex; flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.15);
            transition: width 0.25s ease, min-width 0.25s ease;
            width: 210px; min-width: 210px; overflow: hidden;
        }
        .online-users.collapsed { width: 52px; min-width: 52px; }

        .online-users-header {
            padding: 16px 14px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; user-select: none;
            transition: background 0.15s;
        }
        .online-users-header:hover { background: rgba(255,255,255,0.05); }

        .online-users-header h3 {
            color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 600;
            letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap;
            display: flex; align-items: center; gap: 6px;
        }
        .sidebar-toggle { color: rgba(255,255,255,0.5); font-size: 12px; transition: transform 0.25s; flex-shrink: 0; }
        .online-users.collapsed .sidebar-toggle { transform: rotate(180deg); }

        .sidebar-label { transition: opacity 0.2s; }
        .online-users.collapsed .sidebar-label { opacity: 0; width: 0; overflow: hidden; }

        .online-users-list { padding: 10px 8px; flex: 1; overflow-y: auto; overflow-x: hidden; }
        .online-users-list::-webkit-scrollbar { width: 4px; }
        .online-users-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .user-item {
            padding: 9px 10px; margin-bottom: 6px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; font-size: 13px; color: rgba(255,255,255,0.85);
            display: flex; align-items: center; gap: 8px; white-space: nowrap;
            overflow: hidden;
        }
        .user-item::before {
            content: ''; width: 8px; height: 8px; background: #00e5a0;
            border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px #00e5a0;
        }
        .user-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .online-users.collapsed .user-name { display: none; }
        .online-users.collapsed .btn-call { display: none; }

        .btn-call {
            background: rgba(0,229,160,0.2); border: 1px solid rgba(0,229,160,0.3);
            color: #00e5a0; border-radius: 6px; padding: 3px 7px;
            cursor: pointer; font-size: 13px; transition: background 0.2s; flex-shrink: 0;
        }
        .btn-call:hover { background: rgba(0,229,160,0.4); }

        /* ── Call Overlay ── */
        .call-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; justify-content: center; align-items: center; }
        .call-overlay.active { display: flex; }
        .call-box { background: rgba(30,20,60,0.95); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 40px; text-align: center; min-width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .call-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #7b6fa0, #e91e8c); border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(233,30,140,0.4); } 50% { box-shadow: 0 0 0 15px rgba(233,30,140,0); } }
        .call-status { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 6px; }
        .call-name { color: white; font-size: 22px; font-weight: 700; margin-bottom: 30px; }
        .call-actions { display: flex; gap: 20px; justify-content: center; }
        .btn-accept { width: 56px; height: 56px; background: #00e5a0; border: none; border-radius: 50%; cursor: pointer; font-size: 22px; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,229,160,0.4); }
        .btn-accept:hover { transform: scale(1.1); }
        .btn-reject, .btn-end { width: 56px; height: 56px; background: #e91e4a; border: none; border-radius: 50%; cursor: pointer; font-size: 22px; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(233,30,74,0.4); }
        .btn-reject:hover, .btn-end:hover { transform: scale(1.1); }

        /* ── Main area ── */
        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        /* ── Header with tabs ── */
        .chat-header {
            padding: 14px 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.1);
        }
        .chat-header-top {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
        }
        .chat-header-top h2 { color: white; font-size: 19px; font-weight: 700; }
        .btn-mobile-users { display: none; background: rgba(0,229,160,0.2); border: 1px solid rgba(0,229,160,0.4); color: #00e5a0; border-radius: 10px; padding: 7px 12px; cursor: pointer; font-size: 13px; font-weight: 600; }

        /* ── Tabs ── */
        .chat-tabs { display: flex; gap: 2px; }
        .chat-tab {
            padding: 8px 18px; border: none; background: transparent;
            color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 600;
            cursor: pointer; border-radius: 8px 8px 0 0;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .chat-tab:hover { color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.05); }
        .chat-tab.active { color: white; border-bottom: 2px solid #e91e8c; background: rgba(255,255,255,0.06); }

        /* ── Tab panels ── */
        .tab-content { display: none; flex: 1; flex-direction: column; min-height: 0; }
        .tab-content.active { display: flex; }

        /* ── Messages ── */
        #messagesList { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
        #messagesList::-webkit-scrollbar { width: 5px; }
        #messagesList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        .message { display: flex; animation: fadeUp 0.25s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message-content { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(10px); padding: 10px 14px; border-radius: 14px; max-width: 65%; }
        .message-user { font-weight: 600; font-size: 12px; color: #c084fc; margin-bottom: 4px; }
        .message-text { color: rgba(255,255,255,0.92); font-size: 14px; line-height: 1.5; word-break: break-word; }
        .message-time { font-size: 11px; color: rgba(255,255,255,0.35); text-align: right; margin-top: 5px; }
        .notification { text-align: center; margin: 4px 0; }
        .notification span { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.45); font-size: 12px; padding: 4px 14px; border-radius: 20px; font-style: italic; }
        #typingIndicator { padding: 4px 20px; font-size: 13px; color: rgba(255,255,255,0.45); font-style: italic; min-height: 22px; }

        /* ── Input Area ── */
        .chat-input { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 11px 18px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 25px; font-size: 14px; color: white; outline: none; backdrop-filter: blur(10px); transition: border 0.2s, background 0.2s; }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.4); }
        input[type="text"]:focus { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.15); }
        input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-send { padding: 11px 26px; background: #e91e8c; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s, transform 0.1s; box-shadow: 0 4px 15px rgba(233,30,140,0.4); }
        .btn-send:hover { background: #c2185b; transform: scale(1.03); }
        .btn-image { padding: 11px 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); border-radius: 25px; cursor: pointer; font-size: 16px; transition: background 0.2s; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; }
        .btn-image:hover { background: rgba(255,255,255,0.2); color: white; }
        .btn-image svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* ── Status Update & Blockers panels ── */
        .standup-panel { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .standup-panel::-webkit-scrollbar { width: 5px; }
        .standup-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .standup-post-box {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
        }
        .standup-post-box textarea {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; padding: 10px 14px; color: white; font-size: 14px;
            font-family: inherit; resize: none; outline: none; min-height: 72px;
            transition: border 0.2s, background 0.2s;
        }
        .standup-post-box textarea::placeholder { color: rgba(255,255,255,0.35); }
        .standup-post-box textarea:focus { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.12); }
        .btn-post { align-self: flex-end; padding: 9px 22px; background: #e91e8c; color: white; border: none; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.2s; box-shadow: 0 3px 10px rgba(233,30,140,0.35); }
        .btn-post:hover { background: #c2185b; }

        .standup-entries { display: flex; flex-direction: column; gap: 10px; }
        .standup-entry {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px 16px; animation: fadeUp 0.25s ease;
        }
        .standup-entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .standup-entry-user { font-size: 13px; font-weight: 700; color: #c084fc; }
        .standup-entry-time { font-size: 11px; color: rgba(255,255,255,0.35); }
        .standup-entry-text { font-size: 14px; color: rgba(255,255,255,0.88); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .standup-entry.blocker .standup-entry-user { color: #ff6b8a; }
        .standup-entry.blocker { border-color: rgba(233,30,74,0.25); background: rgba(233,30,74,0.07); }
        .empty-standup { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); font-size: 14px; }

        @media (max-width: 768px) {
            body { align-items: stretch; }
            .chat-wrapper { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; flex-direction: column; border: none; }
            .online-users { display: none; }
            .btn-mobile-users { display: block; }
            .chat-header { padding: 10px 14px 0; }
            #messagesList { padding: 12px; }
            .message-content { max-width: 80%; }
            .chat-input { padding: 10px 12px; gap: 8px; }
            input[type="text"] { font-size: 16px; padding: 10px 14px; }
            #userInput { max-width: 100% !important; }
            .btn-send { padding: 10px 18px; font-size: 14px; white-space: nowrap; }
            .btn-image { width: 42px; height: 42px; flex-shrink: 0; }
        }
    </style>
</head>
<body>
<div class="chat-wrapper">

    <!-- Collapsible Sidebar -->
    <div class="online-users" id="sidebar">
        <div class="online-users-header" onclick="toggleSidebar()" title="Toggle users list">
            <h3>
                <span class="sidebar-label">Online &nbsp;</span>
                <span id="userCount" style="color:#00e5a0;">0</span>
            </h3>
            <span class="sidebar-toggle">◀</span>
        </div>
        <div class="online-users-list" id="usersList"></div>
    </div>

    <!-- Main Chat -->
    <div class="chat-main">
        <div class="chat-header">
            <div class="chat-header-top">
                <h2 id="projectTitle">💬 Chat</h2>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button class="btn-mobile-users" id="mobileCallBtn">👥 Users</button>
                    <button id="logoutBtn" onclick="firebase.auth().signOut().then(()=> window.location.href='/login.html')" style="display:none; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); border-radius:8px; padding:7px 12px; cursor:pointer; font-size:13px;">Logout</button>
                </div>
            </div>
            <!-- Tabs -->
            <div class="chat-tabs">
                <button class="chat-tab active" onclick="switchChatTab('chat', this)">💬 Chat &nbsp;<span id="onlineStatus" style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);">Connecting...</span></button>
                <button class="chat-tab" onclick="switchChatTab('status', this)">📋 Status Update</button>
                <button class="chat-tab" onclick="switchChatTab('blockers', this)">🚧 Blockers</button>
            </div>
        </div>

        <!-- Chat Tab -->
        <div class="tab-content active" id="tabChat">
            <div id="messagesList"></div>
            <div id="typingIndicator"></div>
            <div class="chat-input">
                <div class="input-row">
                    <input type="text" id="userInput" placeholder="Your name" style="max-width:180px;" />
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Your message..." />
                    <input type="file" id="imageInput" accept="image/*" style="display:none;" />
                    <button class="btn-image" id="imageButton" title="Send Image">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" ry="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </button>
                    <button class="btn-send" id="sendButton">Send</button>
                </div>
            </div>
        </div>

        <!-- Status Update Tab -->
        <div class="tab-content" id="tabStatus">
            <div class="standup-panel">
                <div class="standup-post-box">
                    <textarea id="statusInput" placeholder="What are you working on today?"></textarea>
                    <button class="btn-post" onclick="postStandup('status')">Post Update</button>
                </div>
                <div class="standup-entries" id="statusEntries">
                    <div class="empty-standup">No status updates yet. Be the first!</div>
                </div>
            </div>
        </div>

        <!-- Blockers Tab -->
        <div class="tab-content" id="tabBlockers">
            <div class="standup-panel">
                <div class="standup-post-box">
                    <textarea id="blockerInput" placeholder="Describe your blocker..."></textarea>
                    <button class="btn-post" onclick="postStandup('blocker')">Post Blocker</button>
                </div>
                <div class="standup-entries" id="blockerEntries">
                    <div class="empty-standup">No blockers reported. 🎉</div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Call Overlay -->
<div class="call-overlay" id="callOverlay">
    <div class="call-box">
        <div class="call-avatar">👤</div>
        <div class="call-status" id="callStatus">Incoming Call</div>
        <div class="call-name" id="callName">Unknown</div>
        <div class="call-actions" id="callActions">
            <button class="btn-accept" id="acceptCallBtn" title="Accept">📞</button>
            <button class="btn-reject" id="rejectCallBtn" title="Reject">📵</button>
        </div>
    </div>
</div>

<!-- Mobile users popup -->
<div id="mobileUsersOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:200; justify-content:center; align-items:flex-end;">
    <div style="background:rgba(20,10,40,0.97); border:1px solid rgba(255,255,255,0.15); border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-height:60vh; overflow-y:auto;">
        <p style="color:white; font-size:16px; font-weight:700; text-align:center; margin-bottom:16px;">👥 Online Users</p>
        <div id="mobileUsersList"></div>
        <button onclick="document.getElementById('mobileUsersOverlay').style.display='none';" style="width:100%; padding:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:10px; cursor:pointer; font-size:14px; margin-top:10px;">Close</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<audio id="remoteAudio" autoplay></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD77O5jlRji43PruIH9K4uusvFCJQxAbxQ",
        authDomain: "livechatapp-b5399.firebaseapp.com",
        projectId: "livechatapp-b5399",
        storageBucket: "livechatapp-b5399.firebasestorage.app",
        messagingSenderId: "738890891030",
        appId: "1:738890891030:web:55fd84416375761f955a37"
    };
    firebase.initializeApp(firebaseConfig);

    // ── Sidebar toggle ──
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("collapsed");
    }

    // ── Chat tab switching ──
    function switchChatTab(name, btn) {
        document.querySelectorAll(".tab-content").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".chat-tab").forEach(b => b.classList.remove("active"));
        document.getElementById("tab" + name.charAt(0).toUpperCase() + name.slice(1)).classList.add("active");
        btn.classList.add("active");
    }

    // ── Standup posts (Firestore) ──
    function postStandup(type) {
        const inputId = type === "status" ? "statusInput" : "blockerInput";
        const text = document.getElementById(inputId).value.trim();
        if (!text) return;
        const user = document.getElementById("userInput").value || "Anonymous";
        const projectId = window._chatProjectId || "default";
        const collection = type === "status" ? "statusUpdates" : "blockers";
        firebase.firestore().collection(collection).doc(projectId)
            .collection("entries").add({
                user, text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById(inputId).value = "";
            });
    }

    function loadStandupEntries(type) {
        const projectId = window._chatProjectId || "default";
        const collection = type === "status" ? "statusUpdates" : "blockers";
        const containerId = type === "status" ? "statusEntries" : "blockerEntries";
        const emptyMsg = type === "status" ? "No status updates yet. Be the first!" : "No blockers reported. 🎉";
        firebase.firestore().collection(collection).doc(projectId)
            .collection("entries").orderBy("timestamp", "desc").limit(50)
            .onSnapshot(snap => {
                const container = document.getElementById(containerId);
                if (snap.empty) { container.innerHTML = `<div class="empty-standup">${emptyMsg}</div>`; return; }
                container.innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    const time = d.timestamp ? formatTime(d.timestamp.toDate()) : "";
                    return `<div class="standup-entry ${type === 'blocker' ? 'blocker' : ''}">
                        <div class="standup-entry-header">
                            <span class="standup-entry-user">${d.user}</span>
                            <span class="standup-entry-time">${time}</span>
                        </div>
                        <div class="standup-entry-text">${d.text}</div>
                    </div>`;
                }).join("");
            });
    }

    function formatTime(date) {
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    firebase.auth().onAuthStateChanged(function(user) {
        if (!user) { window.location.href = "/login.html"; return; }
        const projectId = sessionStorage.getItem("projectId") || "default";
        const projectName = sessionStorage.getItem("projectName") || "Chat";
        const name = sessionStorage.getItem("userName") || user.displayName || user.email;
        window.firebaseUser = user;
        window._chatProjectId = projectId;
        window._chatProjectName = projectName;
        document.getElementById("userInput").value = name;
        document.getElementById("userInput").disabled = true;
        document.getElementById("logoutBtn").style.display = "block";
        document.getElementById("projectTitle").textContent = "💬 " + projectName;
        loadStandupEntries("status");
        loadStandupEntries("blocker");
        if (window.startChatConnection) window.startChatConnection(name, projectId);
    });
</script>
